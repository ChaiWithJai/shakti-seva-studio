name: validate

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python -m pip install -e '.[dev]'
      - run: pytest
      - run: shaki case --fixture > /tmp/case.json
      - run: python -c 'import json; d=json.load(open("/tmp/case.json")); assert d["case"]["next_step"]["code"] == "urgent_hpd_follow_up"'
