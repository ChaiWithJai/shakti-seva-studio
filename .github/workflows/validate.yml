name: validate

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - run: python -m pip install -e '.[dev]'
      - run: node --test netlify/tests/*.test.mjs
      - run: node --check evals/netlify_acceptance.mjs
      - run: node scripts/build_netlify.mjs
      - run: install -m 755 evals/fake_hermes.sh /tmp/hermes
      - run: echo /tmp >> "$GITHUB_PATH"
      - run: python evals/run.py --output /tmp/day0-eval.json
      - run: shakti case --fixture > /tmp/case.json
      - run: python -c 'import json; d=json.load(open("/tmp/case.json")); assert d["case"]["next_step"]["code"] == "urgent_hpd_follow_up"'
